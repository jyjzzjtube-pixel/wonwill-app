// File text extraction using pdf.js and mammoth.js
// ═══ Noise Filter ═══
// ═══ Pure JS File Analyzer (No CDN, No API) ═══

// --- DOCX Parser: ZIP → document.xml → text ---
async function parseDocx(arrayBuffer) {
  try {
    let bytes = new Uint8Array(arrayBuffer);
    // Find ZIP local file headers (PK\x03\x04)
    let files = {};
    let pos = 0;
    while (pos < bytes.length - 4) {
      if (bytes[pos]===0x50 && bytes[pos+1]===0x4B && bytes[pos+2]===0x03 && bytes[pos+3]===0x04) {
        let nameLen = bytes[pos+26] | (bytes[pos+27]<<8);
        let extraLen = bytes[pos+28] | (bytes[pos+29]<<8);
        let compSize = bytes[pos+18] | (bytes[pos+19]<<8) | (bytes[pos+20]<<16) | (bytes[pos+21]<<24);
        let uncompSize = bytes[pos+22] | (bytes[pos+23]<<8) | (bytes[pos+24]<<16) | (bytes[pos+25]<<24);
        let method = bytes[pos+8] | (bytes[pos+9]<<8);
        let nameBytes = bytes.slice(pos+30, pos+30+nameLen);
        let name = new TextDecoder().decode(nameBytes);
        let dataStart = pos + 30 + nameLen + extraLen;
        let dataBytes = bytes.slice(dataStart, dataStart + compSize);
        if (method === 0) { // stored (no compression)
          files[name] = dataBytes;
        } else if (method === 8) { // deflate
          try {
            // Use DecompressionStream API (modern browsers)
            let ds = new DecompressionStream('deflate-raw');
            let writer = ds.writable.getWriter();
            let reader = ds.readable.getReader();
            writer.write(dataBytes);
            writer.close();
            let chunks = [];
            while(true) {
              let {done, value} = await reader.read();
              if (done) break;
              chunks.push(value);
            }
            let total = chunks.reduce((a,b) => a+b.length, 0);
            let result = new Uint8Array(total);
            let offset = 0;
            chunks.forEach(ch => { result.set(ch, offset); offset += ch.length; });
            files[name] = result;
          } catch(e) { /* skip compressed file */ }
        }
        pos = dataStart + compSize;
      } else {
        pos++;
      }
    }
    // Find word/document.xml
    let docXml = files['word/document.xml'];
    if (!docXml) {
      // Try any xml file with w:t tags
      for (let [name, data] of Object.entries(files)) {
        if (name.endsWith('.xml')) {
          let txt = new TextDecoder().decode(data);
          if (txt.includes('<w:t')) { docXml = data; break; }
        }
      }
    }
    if (!docXml) return null;
    let xml = new TextDecoder().decode(docXml);
    // Extract text from <w:t> tags, add newlines at </w:p>
    let text = xml.replace(/<\/w:p>/g, '\n').replace(/<w:t[^>]*>/g, '').replace(/<[^>]+>/g, '').replace(/\n{3,}/g, '\n\n').trim();
    return text.length > 10 ? text : null;
  } catch(e) {
    return null;
  }
}

// --- PDF Parser: Binary → Text extraction ---
function parsePdf(arrayBuffer) {
  try {
    let bytes = new Uint8Array(arrayBuffer);
    let text = '';
    
    // Method 1: Find text between BT/ET markers and extract Tj/TJ strings
    let str = '';
    for (let i = 0; i < bytes.length; i++) {
      let ch = bytes[i];
      if (ch >= 32 && ch < 127) str += String.fromCharCode(ch);
      else if (ch === 10 || ch === 13) str += '\n';
      else str += ' ';
    }
    
    // Extract parenthesized strings (PDF text objects)
    let results = [];
    let regex = /\(([^)]{1,500})\)/g;
    let match;
    while ((match = regex.exec(str)) !== null) {
      let s = match[1];
      // Unescape PDF escape sequences
      s = s.replace(/\\n/g, '\n').replace(/\\r/g, '').replace(/\\t/g, ' ')
           .replace(/\\\(/g, '(').replace(/\\\)/g, ')').replace(/\\\\/g, '\\');
      // Filter: must contain readable characters
      if (/[가-힣a-zA-Z]{2,}/.test(s) && s.length >= 2) {
        results.push(s);
      }
    }
    
    // Method 2: Try UTF-16BE encoded text (common in Korean PDFs)
    if (results.length < 3) {
      let hexResults = [];
      let hexRegex = /<([0-9A-Fa-f\s]{4,})>/g;
      while ((match = hexRegex.exec(str)) !== null) {
        let hex = match[1].replace(/\s/g, '');
        if (hex.length >= 4 && hex.length % 4 === 0) {
          let decoded = '';
          for (let i = 0; i < hex.length; i += 4) {
            let code = parseInt(hex.substr(i, 4), 16);
            if (code > 31) decoded += String.fromCharCode(code);
          }
          if (decoded.length >= 2 && /[가-힣a-zA-Z]/.test(decoded)) {
            hexResults.push(decoded);
          }
        }
      }
      if (hexResults.length > results.length) results = hexResults;
    }
    
    // Method 3: Look for raw Korean UTF-8 sequences
    if (results.length < 3) {
      let decoder = new TextDecoder('utf-8', {fatal: false});
      let decoded = decoder.decode(bytes);
      // Extract Korean text segments
      let koreanRegex = /[가-힣][가-힣\s,.\d%a-zA-Z]{5,}/g;
      let korMatches = decoded.match(koreanRegex);
      if (korMatches && korMatches.length > results.length) {
        results = korMatches;
      }
    }
    
    // Noise filter (최강화)
    text = results.join(' ').replace(/\s{2,}/g, ' ');
    let lines = text.split(/[.\n]/).filter(l => {
      let t = l.trim();
      if (t.length < 5) return false;
      // PDF 메타데이터
      if (/^D:20\d{2}|D:\d{14}/.test(t)) return false;
      if (/^(Windows|Adobe|Microsoft|Creator|Producer|ModDate|Author)/i.test(t)) return false;
      // ★ 핵심: 한글이 3글자 이상 포함되어야 유효
      let korCount = (t.match(/[가-힣]/g) || []).length;
      if (korCount < 3) return false;
      // 한글 비율이 전체의 15% 미만이면 쓰레기
      if (korCount / t.length < 0.15) return false;
      // 연속 단일 문자 패턴 (바이너리 잔해) ex: "N, ] < Q 6C"
      if (/([^가-힣a-zA-Z0-9]{2,}\s){3,}/.test(t)) return false;
      // 대괄호/백슬래시/중괄호 등 코드 잔해가 2개 이상
      let codeChars = (t.match(/[[\]{}\\|<>~`#$@^]/g) || []).length;
      if (codeChars >= 3) return false;
      return true;
    });
    
    return lines.length > 0 ? lines.join('\n') : null;
  } catch(e) {
    return null;
  }
}

// --- Main File Analyzer ---
async function analyzeFile(file, category, cb) {
  let name = file.name.toLowerCase();
  
  if (name.endsWith('.txt') || name.endsWith('.md') || name.endsWith('.csv')) {
    let r = new FileReader();
    r.onload = e => { cb(expertFormat(e.target.result, category)); };
    r.readAsText(file, 'UTF-8');
    return;
  }
  
  let r = new FileReader();
  r.onload = async e => {
    let buf = e.target.result;
    let text = null;
    
    if (name.endsWith('.docx')) {
      text = await parseDocx(buf);
    } else if (name.endsWith('.pdf')) {
      text = parsePdf(buf);
    }
    
    if (text && text.length > 20) {
      cb(expertFormat(text, category));
    } else {
      cb('[파일 텍스트 추출 실패]\n\n이 파일은 이미지 기반이거나 보안 설정이 되어 있을 수 있습니다.\n\n💡 해결 방법:\n1. 파일을 열어 내용을 Ctrl+A → Ctrl+C로 복사\n2. 위 텍스트 입력칸에 Ctrl+V로 붙여넣기\n3. 붙여넣기 후 아래 [✨ 전문가 톤 변환] 버튼 클릭');
    }
  };
  r.readAsArrayBuffer(file);
}

// ═══ callClaude() - General Claude API caller ═══
async function callClaude(prompt, options = {}) {
  if (!S.claudeKey) throw new Error('Claude API Key가 설정되지 않았습니다');
  let messages = [{role: 'user', content: typeof prompt === 'string' ? prompt : prompt}];
  if (options.systemPrompt) messages = [{role: 'user', content: options.systemPrompt + '\n\n' + (typeof prompt === 'string' ? prompt : JSON.stringify(prompt))}];
  try {
    let res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': S.claudeKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: options.model || 'claude-sonnet-4-20250514',
        max_tokens: options.maxTokens || 2000,
        messages: messages
      })
    });
    let data = await res.json();
    if (data.error) throw new Error(data.error.message || 'API 오류');
    return data.content?.map(c => c.text || '').join('') || '';
  } catch (err) {
    throw err;
  }
}

// ═══ Merge AI Results (Gemini + Claude → Best Version) ═══
async function mergeAIResults(geminiResult, claudeResult, category) {
  // Use whichever AI is available to merge
  let mergePrompt = '다음은 같은 문서를 두 AI가 분석한 결과입니다.\n\n'
    + '=== Gemini 분석 결과 ===\n' + geminiResult + '\n\n'
    + '=== Claude 분석 결과 ===\n' + claudeResult + '\n\n'
    + '두 결과를 종합하여 하나의 최적 버전을 만들어주세요.\n'
    + '규칙:\n- 두 분석에서 가장 좋은 부분만 선택하여 병합\n- 제안서에 적합한 전문적 톤 유지\n- 볼드(**)나 bullet(•) 없이 자연스러운 문장\n- 핵심 수치와 강점 위주 10~15문장\n- 도입부와 마무리 문단 포함\n- 한국어로 작성\n- 카테고리: ' + category;

  // Try Claude first for merging (usually better at synthesis)
  if (S.claudeKey) {
    try {
      let result = await callClaude(mergePrompt, {maxTokens: 2000});
      if (result && result.trim()) {
        return result.replace(/\*\*/g, '').replace(/^[•·\-]\s*/gm, '').replace(/^#+\s*/gm, '').trim();
      }
    } catch(e) { console.log('[Merge] Claude merge failed, trying Gemini...'); }
  }
  // Fallback to Gemini for merging
  if (S.geminiKey) {
    try {
      let res = await fetch('https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=' + S.geminiKey, {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({contents: [{parts: [{text: mergePrompt}]}]})
      });
      let data = await res.json();
      let text = data.candidates?.[0]?.content?.parts?.[0]?.text || '';
      if (text.trim()) return text.replace(/\*\*/g, '').replace(/^[•·\-]\s*/gm, '').replace(/^#+\s*/gm, '').trim();
    } catch(e) { console.log('[Merge] Gemini merge also failed'); }
  }
  // Manual merge: combine both
  return geminiResult + '\n\n---\n\n' + claudeResult;
}

// ═══ Dual AI Analyze (Gemini + Claude → Merged) ═══
async function dualAIAnalyze(file, category, dtInp, statusEl, fileDesc) {
  let hasG = !!S.geminiKey, hasC = !!S.claudeKey;
  if (!hasG && !hasC) {
    dtInp.value = '[AI Key가 설정되지 않았습니다]\n기본 탭 → AI 연동 설정에서 Gemini 또는 Claude Key를 입력해주세요.';
    return;
  }

  let geminiResult = null, claudeResult = null;
  let descNote = fileDesc ? '\n\n사용자 설명: ' + fileDesc : '';

  // Update status
  function updateStatus(step, gemSt, claSt, mergeSt) {
    if (!statusEl) return;
    statusEl.innerHTML = '';
    statusEl.style.display = 'block';
    statusEl.style.background = '#F8F9FA';
    let steps = [
      {label: 'Gemini 분석', st: gemSt},
      {label: 'Claude 분석', st: claSt},
      {label: 'AI 병합 (최적화)', st: mergeSt}
    ];
    steps.forEach(s => {
      let cls = s.st === 'done' ? 'step done' : s.st === 'active' ? 'step active' : 'step';
      let dot = document.createElement('div');
      dot.className = 'step-dot';
      let el = document.createElement('div');
      el.className = cls;
      el.appendChild(dot);
      let txt = document.createElement('span');
      txt.textContent = s.label + (s.st === 'active' ? ' ...' : s.st === 'done' ? ' ✓' : '');
      el.appendChild(txt);
      statusEl.appendChild(el);
    });
  }

  // Step 1+2: Run Gemini and Claude in parallel
  let promises = [];
  if (hasG) {
    updateStatus(1, 'active', hasC ? 'active' : '', '');
    promises.push(new Promise(resolve => {
      analyzeWithGemini(file, category + descNote, result => {
        if (!result.startsWith('[')) geminiResult = result;
        resolve();
      });
    }));
  }
  if (hasC) {
    if (!hasG) updateStatus(1, '', 'active', '');
    promises.push(new Promise(resolve => {
      analyzeWithClaude(file, category + descNote, result => {
        if (!result.startsWith('[')) claudeResult = result;
        resolve();
      });
    }));
  }

  await Promise.all(promises);
  updateStatus(2, hasG ? 'done' : '', hasC ? 'done' : '', '');

  // Step 3: Merge results
  if (geminiResult && claudeResult) {
    updateStatus(3, 'done', 'done', 'active');
    dtInp.value = '🔄 두 AI의 분석을 병합하여 최적 버전을 생성 중...';
    let merged = await mergeAIResults(geminiResult, claudeResult, category);
    dtInp.value = merged;
    updateStatus(3, 'done', 'done', 'done');
    if (statusEl) {
      let badge = document.createElement('div');
      badge.className = 'ai-merge-badge';
      badge.style.background = 'linear-gradient(135deg, #4285F4, #D97706)';
      badge.style.color = '#fff';
      badge.textContent = '✨ Gemini + Claude 병합 완료';
      statusEl.appendChild(badge);
    }
  } else if (geminiResult) {
    dtInp.value = geminiResult;
    updateStatus(3, 'done', hasC ? 'done' : '', 'done');
    if (statusEl) {
      let badge = document.createElement('div');
      badge.className = 'ai-merge-badge';
      badge.style.cssText = 'background:#E8F0FE;color:#4285F4';
      badge.textContent = '🤖 Gemini 단독 분석';
      statusEl.appendChild(badge);
    }
  } else if (claudeResult) {
    dtInp.value = claudeResult;
    updateStatus(3, hasG ? 'done' : '', 'done', 'done');
    if (statusEl) {
      let badge = document.createElement('div');
      badge.className = 'ai-merge-badge';
      badge.style.cssText = 'background:#FFF8E1;color:#D97706';
      badge.textContent = '🧠 Claude 단독 분석';
      statusEl.appendChild(badge);
    }
  } else {
    dtInp.value = '[AI 분석 실패] 두 AI 모두 결과를 생성하지 못했습니다.\n로컬 분석으로 대체합니다.';
    analyzeFile(file, category, result => { dtInp.value = result; });
    if (statusEl) statusEl.style.display = 'none';
  }
  return dtInp.value;
}

// ═══ XLSX Parser (Pure JS - basic) ═══
async function parseXlsx(arrayBuffer) {
  try {
    let bytes = new Uint8Array(arrayBuffer);
    let files = await extractZipFiles(bytes);
    // Find shared strings
    let ssXml = files['xl/sharedStrings.xml'];
    let strings = [];
    if (ssXml) {
      let xml = new TextDecoder().decode(ssXml);
      let regex = /<t[^>]*>([^<]+)<\/t>/g;
      let m;
      while ((m = regex.exec(xml)) !== null) strings.push(m[1]);
    }
    // Find sheet1
    let sheetXml = files['xl/worksheets/sheet1.xml'];
    if (!sheetXml) {
      for (let [name, data] of Object.entries(files)) {
        if (name.includes('sheet') && name.endsWith('.xml')) { sheetXml = data; break; }
      }
    }
    if (!sheetXml) return null;
    let xml = new TextDecoder().decode(sheetXml);
    let rows = [];
    let rowRegex = /<row[^>]*>([\s\S]*?)<\/row>/g;
    let rm;
    while ((rm = rowRegex.exec(xml)) !== null) {
      let cells = [];
      let cellRegex = /<c[^>]*(?:t="s"[^>]*)?>[\s\S]*?<v>(\d+)<\/v>[\s\S]*?<\/c>|<c[^>]*>[\s\S]*?<v>([^<]+)<\/v>[\s\S]*?<\/c>/g;
      let cm;
      let rowContent = rm[1];
      while ((cm = cellRegex.exec(rowContent)) !== null) {
        if (cm[1] !== undefined && strings[parseInt(cm[1])]) cells.push(strings[parseInt(cm[1])]);
        else if (cm[2] !== undefined) cells.push(cm[2]);
      }
      if (cells.length > 0) rows.push(cells.join('\t'));
    }
    return rows.length > 0 ? rows.join('\n') : null;
  } catch(e) { return null; }
}

// ═══ PPTX Parser (Pure JS - basic) ═══
async function parsePptx(arrayBuffer) {
  try {
    let bytes = new Uint8Array(arrayBuffer);
    let files = await extractZipFiles(bytes);
    let texts = [];
    for (let [name, data] of Object.entries(files)) {
      if (name.startsWith('ppt/slides/slide') && name.endsWith('.xml')) {
        let xml = new TextDecoder().decode(data);
        // Extract text from <a:t> tags
        let regex = /<a:t>([^<]+)<\/a:t>/g;
        let m;
        let slideTexts = [];
        while ((m = regex.exec(xml)) !== null) {
          if (m[1].trim()) slideTexts.push(m[1].trim());
        }
        if (slideTexts.length > 0) texts.push(slideTexts.join(' '));
      }
    }
    return texts.length > 0 ? texts.join('\n\n') : null;
  } catch(e) { return null; }
}

// ═══ ZIP File Extractor (shared) ═══
async function extractZipFiles(bytes) {
  let files = {};
  let pos = 0;
  while (pos < bytes.length - 4) {
    if (bytes[pos]===0x50 && bytes[pos+1]===0x4B && bytes[pos+2]===0x03 && bytes[pos+3]===0x04) {
      let nameLen = bytes[pos+26] | (bytes[pos+27]<<8);
      let extraLen = bytes[pos+28] | (bytes[pos+29]<<8);
      let compSize = bytes[pos+18] | (bytes[pos+19]<<8) | (bytes[pos+20]<<16) | (bytes[pos+21]<<24);
      let method = bytes[pos+8] | (bytes[pos+9]<<8);
      let nameBytes = bytes.slice(pos+30, pos+30+nameLen);
      let name = new TextDecoder().decode(nameBytes);
      let dataStart = pos + 30 + nameLen + extraLen;
      let dataBytes = bytes.slice(dataStart, dataStart + compSize);
      if (method === 0) {
        files[name] = dataBytes;
      } else if (method === 8) {
        try {
          let ds = new DecompressionStream('deflate-raw');
          let writer = ds.writable.getWriter();
          let reader = ds.readable.getReader();
          writer.write(dataBytes);
          writer.close();
          let chunks = [];
          while(true) {
            let {done, value} = await reader.read();
            if (done) break;
            chunks.push(value);
          }
          let total = chunks.reduce((a,b) => a+b.length, 0);
          let result = new Uint8Array(total);
          let offset = 0;
          chunks.forEach(ch => { result.set(ch, offset); offset += ch.length; });
          files[name] = result;
        } catch(e) {}
      }
      pos = dataStart + compSize;
    } else {
      pos++;
    }
  }
  return files;
}

// ═══ Enhanced File Analyzer (with xlsx/pptx) ═══
async function analyzeFileEnhanced(file, category, cb) {
  let name = file.name.toLowerCase();
  if (name.endsWith('.txt') || name.endsWith('.md') || name.endsWith('.csv')) {
    let r = new FileReader();
    r.onload = e => { cb(expertFormat(e.target.result, category)); };
    r.readAsText(file, 'UTF-8');
    return;
  }
  let r = new FileReader();
  r.onload = async e => {
    let buf = e.target.result;
    let text = null;
    if (name.endsWith('.docx')) text = await parseDocx(buf);
    else if (name.endsWith('.pdf')) text = parsePdf(buf);
    else if (name.endsWith('.xlsx') || name.endsWith('.xls')) text = await parseXlsx(buf);
    else if (name.endsWith('.pptx') || name.endsWith('.ppt')) text = await parsePptx(buf);
    if (text && text.length > 20) cb(expertFormat(text, category));
    else cb('[파일 텍스트 추출 실패]\n\n이 파일은 이미지 기반이거나 보안 설정이 되어 있을 수 있습니다.\n\n해결 방법:\n1. 파일을 열어 내용을 Ctrl+A → Ctrl+C로 복사\n2. 위 텍스트 입력칸에 Ctrl+V로 붙여넣기\n3. 붙여넣기 후 아래 [전문가 톤 변환] 버튼 클릭');
  };
  r.readAsArrayBuffer(file);
}

// ═══ Create Drop Zone Element ═══
function createDropZone(category, dtInp, statusEl, stateKey) {
  let zone = document.createElement('div');
  zone.className = 'drop-zone';
  zone.innerHTML = '<div class="drop-zone-icon">📁</div>'
    + '<div class="drop-zone-text">파일을 여기에 드래그 & 드롭<br>또는 클릭하여 업로드</div>'
    + '<div class="drop-zone-formats">PDF, Word(.docx), Excel(.xlsx), PPT(.pptx), 이미지, 텍스트</div>';

  let fileInput = document.createElement('input');
  fileInput.type = 'file';
  fileInput.accept = '.txt,.pdf,.docx,.xlsx,.xls,.pptx,.ppt,.hwp,.md,.png,.jpg,.jpeg';
  fileInput.style.display = 'none';

  zone.appendChild(fileInput);
  zone.onclick = (e) => { if (e.target === zone || zone.contains(e.target)) fileInput.click(); };

  // Drag events
  zone.ondragover = (e) => { e.preventDefault(); e.stopPropagation(); zone.classList.add('drag-over'); };
  zone.ondragleave = (e) => { e.preventDefault(); zone.classList.remove('drag-over'); };
  zone.ondrop = (e) => {
    e.preventDefault(); zone.classList.remove('drag-over');
    let files = e.dataTransfer.files;
    if (files.length > 0) handleDroppedFile(files[0], category, dtInp, statusEl, stateKey);
  };

  fileInput.onchange = (e) => {
    let f = e.target.files[0];
    if (!f) return;
    handleDroppedFile(f, category, dtInp, statusEl, stateKey);
    fileInput.value = '';
  };

  return zone;
}

async function downloadDriveFile(file,category,dtInp){
  try{
    let url,isGDoc=file.mimeType==='application/vnd.google-apps.document';
    if(isGDoc){
      url='https://www.googleapis.com/drive/v3/files/'+file.id+'/export?mimeType=text/plain';
    } else {
      url='https://www.googleapis.com/drive/v3/files/'+file.id+'?alt=media';
    }
    let res=await fetch(url,{headers:{'Authorization':'Bearer '+gAuthToken}});
    if(isGDoc || file.mimeType==='text/plain'){
      let text=await res.text();
      dtInp.value='✨ 변환 중...';
      // AI 연동이 있으면 AI로, 없으면 로컬
      if(S.geminiKey){
        let blob=new Blob([text],{type:'text/plain'});
        let f=new File([blob],file.name+'.txt',{type:'text/plain'});
        analyzeWithGemini(f,category,result=>{dtInp.value=result;if(category==='상권분석')S.areaDetailText=result;else S.brandDetailText=result;upd();});
      } else if(S.claudeKey){
        let blob=new Blob([text],{type:'text/plain'});
        let f=new File([blob],file.name+'.txt',{type:'text/plain'});
        analyzeWithClaude(f,category,result=>{dtInp.value=result;if(category==='상권분석')S.areaDetailText=result;else S.brandDetailText=result;upd();});
      } else {
        dtInp.value=expertFormat(text,category);
        if(category==='상권분석')S.areaDetailText=dtInp.value;else S.brandDetailText=dtInp.value;upd();
      }
    } else {
      // PDF/DOCX → blob → AI
      let blob=await res.blob();
      let f=new File([blob],file.name,{type:file.mimeType});
      dtInp.value='🤖 AI 분석 중: '+file.name;
      if(S.geminiKey){
        analyzeWithGemini(f,category,result=>{dtInp.value=result;if(category==='상권분석')S.areaDetailText=result;else S.brandDetailText=result;upd();});
      } else if(S.claudeKey){
        analyzeWithClaude(f,category,result=>{dtInp.value=result;if(category==='상권분석')S.areaDetailText=result;else S.brandDetailText=result;upd();});

      }
    }
  }catch(err){
    dtInp.value='[다운로드 실패] '+err.message;
  }
}

function expertFormat(rawText, category) {
  let lines = rawText.split('\n').filter(l => {
    let t = l.trim();
    if (t.length < 5) return false;
    let korCount = (t.match(/[가-힣]/g) || []).length;
    if (korCount < 3) return false;
    if (korCount / t.length < 0.15) return false;
    let codeChars = (t.match(/[[\]{}\\|<>~`#$@^]/g) || []).length;
    if (codeChars >= 3) return false;
    if (/^D:\d|^(Windows|Adobe|Creator|Producer)/i.test(t)) return false;
    return true;
  });
  if (lines.length === 0) return rawText;

  let isBrand = category !== '상권분석';

  // 원본 문장을 정제 (bullet/마크다운 제거, 짧은 줄 합치기)
  let cleaned = [];
  lines.forEach(l => {
    let t = l.trim().replace(/^[-•·*▸▹►■□●○]\s*/, '').replace(/\*\*/g, '').replace(/^【[^】]*】\s*/, '');
    if (t.length > 3) cleaned.push(t);
  });

  // 너무 짧은 조각들 합치기 (15자 미만은 다음 줄에 붙이기)
  let merged = [];
  let buf = '';
  cleaned.forEach(l => {
    if (l.length < 15 && buf.length > 0) {
      buf += ' ' + l;
    } else {
      if (buf) merged.push(buf);
      buf = l;
    }
  });
  if (buf) merged.push(buf);

  // 도입부
  let intro = isBrand
    ? '본 브랜드는 차별화된 경쟁력과 검증된 수익 모델을 바탕으로 가맹사업을 운영하고 있습니다. 다음은 해당 브랜드의 핵심 내용을 정리한 것입니다.'
    : '해당 상권은 다양한 수요 기반을 갖추고 있어, 외식 프랜차이즈 운영에 최적화된 입지로 분석됩니다. 다음은 상권 분석 자료의 핵심 내용입니다.';

  // 마무리
  let closing = isBrand
    ? '이러한 강점들을 종합적으로 고려했을 때, 안정적인 수익 창출과 장기적인 성장이 가능한 프랜차이즈 모델로 판단됩니다.'
    : '종합적으로 분석했을 때, 본 상권은 충분한 수요 기반과 성장 가능성을 갖추고 있어 성공적인 매장 운영이 기대됩니다.';

  // 원본이 이미 충분히 긴 경우 (10줄 이상) → 정제만 하고 도입/마무리 추가
  if (merged.length >= 8) {
    return [intro, '', ...merged, '', closing].join('\n');
  }

  // 원본이 짧은 경우 → 문장 연결어 추가로 스토리텔링화
  let connectors = [
    '', '또한, ', '특히, ', '이에 더해, ', '아울러, ', '무엇보다, ', '한편, ', '이와 함께, '
  ];
  let result = [intro, ''];
  merged.forEach((line, i) => {
    let conn = i < connectors.length ? connectors[i] : '';
    // 첫 글자가 소문자 연결어와 겹치면 그냥 사용
    let sentence = conn + line;
    // 문장 끝에 마침표 없으면 추가
    if (!/[.다요함임됨음]$/.test(sentence.trim())) sentence = sentence.trim() + '.';
    result.push(sentence);
    // 2~3문장마다 빈줄 추가로 문단 구분
    if ((i + 1) % 3 === 0) result.push('');
  });
  result.push('');
  result.push(closing);

  return result.join('\n');
}

/* ═══════════════ CALCULATIONS ═══════════════ */
function cWH(sch){let h=0;DAYS.forEach(d=>{if(sch[d]?.on){let w=sch[d].end-sch[d].start;h+=w>4?w-.5:w;}});return h;}
function wHH(sch){let h=0,days=0;DAYS.forEach(d=>{if(sch[d]?.on){h+=sch[d].end-sch[d].start;days++;}});return h>=15?h/Math.max(days,1):0;}
function calcCost(s){
  let wh=cWH(s.schedule),mh=wh*4.345;
  if(s.type==="freelance"){
    let base=s.payMode==="hourly"?mh*(s.wage||MW):s.salary;
    let iT=Math.round(base*.03),lT=Math.round(base*.003),t33=iT+lT;
    return{wh,mh,base,whP:0,gross:base,eIns:0,eTotal:base,t33,iT,lT,net:base-t33,ins:{},fl:true,wIns:0};
  }
  let whH=s.type==="monthly"?0:wHH(s.schedule);
  let base=s.type==="monthly"?s.salary:(s.payMode==="monthly"?s.salary:mh*(s.wage||MW));
  let whP=whH*(s.wage||MW)*4.345,gross=base+whP;
  let eIns=0,ins={};
  if(gross>=800000)EMP_INS.forEach(v=>{let a=Math.round(gross*v.r);ins[v.n]=a;eIns+=a;});
  let wIns=gross>=800000?Math.round(gross*.09):0;
  return{wh,mh,base,whP,gross,eIns,eTotal:gross+eIns,wIns,net:gross-wIns,t33:0,ins,fl:false,iT:0,lT:0};
}
function getCalcs(){
  let basisRev=S.revTarget.basis==="t1"?S.revTarget.t1:S.revTarget.basis==="t3"?S.revTarget.t3:S.revTarget.t2;
  let revAvg=basisRev*10000;
  if(S.showRevenue&&S.revSets.length>0){let v=S.revSets.flatMap(r=>r.data).filter(x=>x>0);if(v.length>0)revAvg=v.reduce((a,b)=>a+b,0)/v.length*10000;}
  let staffC=S.staff.map(s=>({...s,c:calcCost(s)}));
  let totalLabor=staffC.reduce((a,b)=>a+b.c.eTotal,0);
  let laborRatio=revAvg>0?totalLabor/revAvg*100:0;
  let costTotal=S.costItems.reduce((a,ci)=>a+(ci.mode==="percent"?revAvg*ci.value/100:ci.value),0)+totalLabor;
  let profit=revAvg-costTotal;
  let setupTotal=S.setupItems.reduce((a,b)=>a+b.value,0);
  let roiInvest=S.roiItems.filter(r=>!r.excluded).reduce((a,b)=>a+b.value,0);
  let rentItem=S.costItems.find(ci=>ci.name.includes("임대"));
  let mRent=rentItem?(rentItem.mode==="percent"?revAvg*rentItem.value/100:rentItem.value):0;
  let rentSave=S.rentFree.enabled?(mRent-(S.rentFree.adminFee||0))*(S.rentFree.months||0):0;
  let effInvest=roiInvest*10000-rentSave;
  let roiMonths=profit>0?Math.ceil(Math.max(effInvest,0)/profit):999;
  let schSum=DAYS.map(d=>{let w=staffC.filter(s=>s.schedule[d]?.on);return{day:d,total:w.length,kitchen:w.filter(s=>s.role==="kitchen").length,hall:w.filter(s=>s.role==="hall").length};});
  return{basisRev,revAvg,staffC,totalLabor,laborRatio,costTotal,profit,setupTotal,roiInvest,rentSave,effInvest,roiMonths,schSum};
}

/* ═══════════════ RENDER ENGINE ═══════════════ */
function h(tag,attrs,...children){
  if(typeof tag==="string"){let el=document.createElement(tag);if(attrs)Object.entries(attrs).forEach(([k,v])=>{if(k==="style"&&typeof v==="object")Object.assign(el.style,v);else if(k.startsWith("on"))el[k.toLowerCase()]=v;else if(k==="className")el.className=v;else if(k==="value"&&(tag==="input"||tag==="textarea"||tag==="select"))el.value=v??"";else if(k==="checked")el.checked=v;else if(k==="type")el.type=v;else if(k==="placeholder")el.placeholder=v;else if(k==="accept")el.accept=v;else if(k==="multiple")el.multiple=v;else if(k==="href"){el.href=v;el.target="_blank";el.rel="noopener noreferrer";}else if(k==="src")el.src=v;else if(k==="innerHTML")el.innerHTML=v;else el.setAttribute(k,v);});children.flat(9).forEach(c=>{if(c==null||c===false)return;if(typeof c==="string"||typeof c==="number")el.appendChild(document.createTextNode(c));else if(c instanceof Node)el.appendChild(c);});return el;}
}

function renderTabs(){

  bar.innerHTML='';
  TABS.forEach(t=>{let b=document.createElement('button');b.innerHTML='<i class="'+t.icon+'"></i> '+t.label;b.className=S.tab===t.id?'on':'';b.onclick=()=>setTab(t.id);bar.appendChild(b);});

/* ═══════════════ MEDIA/LINKS BLOCK ═══════════════ */
function mlbBlock(mediaKey,linksKey){
  let media=S[mediaKey],links=S[linksKey],c=S.brandColor;
  let wrap=h('div',{style:{marginTop:'10px'}});
  // File upload
  let fileIn=h('input',{type:'file',accept:'image/*,.pdf',multiple:true,style:{display:'none'},onChange:e=>{
    Array.from(e.target.files).forEach(f=>{
      if(f.type==='application/pdf')S[mediaKey].push({type:'pdf',name:f.name,url:URL.createObjectURL(f)});
      else{let r=new FileReader();r.onload=ev=>{S[mediaKey].push({type:'image',name:f.name,url:ev.target.result});upd();};r.readAsDataURL(f);}
    });upd();e.target.value='';
  }});
  let fileBtn=h('label',{style:{display:'block',textAlign:'center',padding:'10px',border:`2px dashed ${c}44`,borderRadius:'10px',color:c,fontSize:'11px',fontWeight:'700',cursor:'pointer',marginBottom:'6px'}},fileIn,'📎 사진/PDF 추가 (다중)');
  fileBtn.onclick=()=>fileIn.click();
  wrap.appendChild(fileBtn);
  // Media thumbnails
  if(media.length>0){
    let row=h('div',{className:'media-row'});
    media.forEach((m,i)=>{
      let item=h('div',{style:{position:'relative'}});
      if(m.type==='image')item.appendChild(h('img',{src:m.url,className:'media-thumb'}));
      else item.appendChild(h('div',{style:{width:'72px',height:'72px',borderRadius:'8px',background:'#f5f5f5',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',fontSize:'9px',color:'#888'},innerHTML:'<span style="font-size:22px">📄</span>'+m.name.slice(0,8)}));
      let del=h('button',{style:{position:'absolute',top:'-5px',right:'-5px',background:'#E53935',color:'#fff',border:'none',borderRadius:'10px',width:'18px',height:'18px',fontSize:'9px',cursor:'pointer',fontWeight:'900'},onClick:()=>{S[mediaKey].splice(i,1);upd();}},'✕');
      item.appendChild(del);row.appendChild(item);
    });
    wrap.appendChild(row);
  }
  // Links
  wrap.appendChild(h('div',{style:{fontSize:'10px',fontWeight:'700',color:'#888',marginBottom:'4px'}},'🔗 링크 (블로그·인스타·유튜브 등)'));
  links.forEach((l,i)=>{
    let row=h('div',{className:'row'});
    let inp1=h('input',{value:l.label,placeholder:'라벨',style:{width:'65px',border:'1px solid #eee',borderRadius:'6px',padding:'5px 7px',fontSize:'11px'},onChange:e=>{S[linksKey][i].label=e.target.value;}});
    let inp2=h('input',{value:l.url,placeholder:'https://...',style:{flex:'1',border:'1px solid #eee',borderRadius:'6px',padding:'5px 7px',fontSize:'11px'},onChange:e=>{S[linksKey][i].url=e.target.value;}});
    let del=h('button',{className:'btn-del',onClick:()=>{S[linksKey].splice(i,1);upd();}},'✕');
    row.append(inp1,inp2,del);wrap.appendChild(row);
  });
  wrap.appendChild(h('button',{className:'btn-add',style:{fontSize:'10px',padding:'6px'},onClick:()=>{S[linksKey].push({label:'',url:''});upd();}},'+ 링크'));
  return wrap;
}

function mlpBlock(mediaKey,linksKey){
  let media=S[mediaKey],links=S[linksKey];let wrap=h('div',{});
  if(media.length>0){
    let imgs=media.filter(m=>m.type==='image'),pdfs=media.filter(m=>m.type!=='image');
    if(imgs.length>0){
      let scroll=h('div',{className:'gallery-scroll'});
      imgs.forEach(m=>{let img=h('img',{src:m.url});img.onclick=(e)=>{e.preventDefault();openLightbox(m.url);};scroll.appendChild(img);});
      wrap.appendChild(scroll);
    }
    if(pdfs.length>0){let pr=h('div',{style:{display:'flex',gap:'10px',flexWrap:'wrap',marginBottom:'12px'}});pdfs.forEach(m=>{pr.appendChild(h('a',{href:m.url,style:{display:'flex',alignItems:'center',gap:'10px',padding:'12px 18px',background:'#F9FAFB',border:'1.5px solid #E5E7EB',borderRadius:'12px',textDecoration:'none',color:'#333',fontSize:'12px',fontWeight:'600',transition:'background .2s'}},h('i',{className:'ri-attachment-2',style:{fontSize:'16px',color:'#6B7280'}}),h('span',{},m.name),h('i',{className:'ri-arrow-right-s-line',style:{fontSize:'14px',color:'#9CA3AF'}})));});wrap.appendChild(pr);}
  }
  let vl=links.filter(l=>l.url);
  if(vl.length>0){let row=h('div',{style:{display:'flex',gap:'8px',flexWrap:'wrap',marginTop:'8px'}});vl.forEach(l=>{row.appendChild(h('a',{href:l.url,className:'link-pill'},h('i',{className:'ri-link',style:{marginRight:'4px'}}),(l.label||l.url.replace(/https?:\/\/(www\.)?/,'').slice(0,20))));});wrap.appendChild(row);}
  return wrap;
}
function renderEdit(){
  renderTabs();
  let el=document.getElementById('tabContent');
  el.innerHTML='';
  let c=S.brandColor;
  let T=S.tab;

  if(T==="basic") el.appendChild(renderBasic());
  else if(T==="menu") el.appendChild(renderMenu());
  else if(T==="area") el.appendChild(renderArea());
  else if(T==="story") el.appendChild(renderStory());
  else if(T==="space") el.appendChild(renderSpace());
  else if(T==="setup") el.appendChild(renderSetup());
  else if(T==="revenue") el.appendChild(renderRevenue());
  else if(T==="cost") el.appendChild(renderCostTab());
  else if(T==="labor") el.appendChild(renderLabor());
  else if(T==="roi") el.appendChild(renderROI());
  else if(T==="media") el.appendChild(renderMediaHub());
  else if(T==="comp") el.appendChild(renderComp());
  else if(T==="support") el.appendChild(renderSupport());
  else if(T==="closing") el.appendChild(renderClosing());
  else if(T==="sign") el.appendChild(renderSign());
}

function autoDetectCategory(filename, desc){
  let t=(filename+' '+desc).toLowerCase();
  if(/외관|간판|입구|정면|건물/.test(t))return 'exterior';
  if(/내부|인테리어|홀|좌석|테이블/.test(t))return 'interior';
  if(/메뉴|음식|요리|플레이팅|세팅/.test(t))return 'menu_photo';
  if(/상권|유동|입지|지도|주변|거리/.test(t))return 'area_photo';
  if(/로고|브랜드|CI|디자인|패키지/.test(t))return 'brand_ci';
  if(/계약|서류|견적|인허가|등록/.test(t))return 'document';
  if(/경쟁|타브랜드|비교/.test(t))return 'competitor';
  return 'other';
}

// 미디어를 슬라이드별로 자동 분배
function distributeMediaToSlides(){
  let catToMedia={area:'areaMedia',story:'brandMedia',menu:'menuMedia',space:'areaMedia',setup:'areaMedia',comp:'areaMedia'};
  S.mediaHub.forEach(item=>{
    if(item.type!=='image')return;
    let cat=MEDIA_CATS.find(mc=>mc.id===item.category);
    if(!cat||!cat.slide)return;
    let targetKey=catToMedia[cat.slide];
    if(!targetKey||!S[targetKey])return;
    // 중복 방지
    if(S[targetKey].some(m=>m.name===item.name))return;
    S[targetKey].push({type:'image',name:item.name,url:item.url,desc:item.desc});
  });
  upd();
}

// Drive 폴더별 업로드
async function uploadAllToDrive(){
  if(!gAuthToken){
    loadGooglePicker(()=>{
      let tokenClient=google.accounts.oauth2.initTokenClient({
        client_id:S.gDriveClientId,
        scope:'https://www.googleapis.com/auth/drive.file',
        callback:(resp)=>{
          if(resp.error)return;
          gAuthToken=resp.access_token;
          doUploadToDrive();
        }
      });
      tokenClient.requestAccessToken({prompt:'consent'});
    });
  } else { doUploadToDrive(); }
}

async function doUploadToDrive(){
  let brand=S.brand||'제안서';
  // 루트 폴더 생성
  let rootId=await createDriveFolder(brand+'_제안서_자료',null);
  // 카테고리별 폴더 생성 + 업로드
  for(let mc of MEDIA_CATS){
    let items=S.mediaHub.filter(m=>m.category===mc.id);
    if(items.length===0)continue;
    let folderId=await createDriveFolder(mc.icon+' '+mc.label,rootId);
    for(let item of items){
      if(item.synced)continue;
      await uploadFileToDrive(item,folderId);
      item.synced=true;
    }
  }
  upd();
  alert('☁️ Google Drive 업로드 완료!\n폴더: '+brand+'_제안서_자료');
}

async function createDriveFolder(name,parentId){
  let meta={name:name,mimeType:'application/vnd.google-apps.folder'};
  if(parentId)meta.parents=[parentId];
  let res=await fetch('https://www.googleapis.com/drive/v3/files',{
    method:'POST',headers:{'Authorization':'Bearer '+gAuthToken,'Content-Type':'application/json'},
    body:JSON.stringify(meta)
  });
  let data=await res.json();
  return data.id;
}

async function uploadFileToDrive(item,folderId){
  // base64 → blob
  let resp=await fetch(item.url);
  let blob=await resp.blob();
  let meta=JSON.stringify({name:(item.desc||item.name),parents:[folderId]});
  let form=new FormData();
  form.append('metadata',new Blob([meta],{type:'application/json'}));
  form.append('file',blob);
  await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart',{
    method:'POST',headers:{'Authorization':'Bearer '+gAuthToken},body:form
  });
}

  if(S.rentFree.enabled)s.appendChild(h('div',{style:{marginTop:'.6em',fontSize:'.7em',color:'#2E7D32',fontWeight:'700'}},'렌트프리 '+S.rentFree.months+'개월 → 절감 '+fW(rentSave)));
  slides.push(s);}

  // ━━ S11: COMP ━━
  if(sv.comp&&S.competitors.length>1){let s=mkS();s.appendChild(sT('⚖️','경쟁 비교'));
  let tbl=h('table',{});let thead=h('thead',{});let htr=h('tr',{style:{background:nv}});
  ['브랜드','가맹금','로열티','인테리어','특장점'].forEach(t=>{htr.appendChild(h('th',{style:{textAlign:'center',color:'#fff'}},t));});
  thead.appendChild(htr);tbl.appendChild(thead);let tbd=h('tbody',{});
  S.competitors.forEach(comp=>{let isSelf=comp.id==='self';let r=h('tr',{style:{borderBottom:'1px solid #eee',background:isSelf?'#FFF8E1':''}});
  r.append(h('td',{style:{fontWeight:isSelf?'900':'600',color:isSelf?ac:'#333',textAlign:'center'}},comp.name),h('td',{style:{textAlign:'center'}},comp.franchise),h('td',{style:{textAlign:'center'}},comp.royalty),h('td',{style:{textAlign:'center'}},comp.interior),h('td',{style:{textAlign:'left',fontSize:'.85em'}},comp.note));tbd.appendChild(r);});
  tbl.appendChild(tbd);s.appendChild(tbl);slides.push(s);}

  // ━━ S12: SUPPORT Bento ━━
  if(sv.support&&S.supportItems.some(si=>si.title)){let s=mkS();s.appendChild(sT('🏢','본사 지원사항'));
  let items=S.supportItems.filter(si=>si.title);
  let g=h('div',{style:{display:'grid',gridTemplateColumns:items.length%2===1?'1fr 1fr':'1fr 1fr',gap:'.35em',flex:'1'}});
  items.forEach((si,idx)=>{
  let isLast=items.length%2===1&&idx===items.length-1;
  g.appendChild(h('div',{style:{gridColumn:isLast?'1/-1':'auto',padding:'.6em',background:'#fafafa',borderRadius:'.5em',border:'1px solid #eee'}},
    h('div',{style:{fontSize:'1.5em',marginBottom:'.15em'}},si.icon),
    h('div',{style:{fontSize:'.85em',fontWeight:'900',marginBottom:'.08em'}},si.title),
    h('div',{style:{fontSize:'.7em',color:'#666',lineHeight:'1.5'}},si.desc)
  ));});s.appendChild(g);slides.push(s);}

  // ━━ S13: CLOSING + SIGN ━━
  if(sv.closing||sv.sign){let s=mkS();s.style.cssText+='min-height:40cqw;text-align:center;justify-content:center';
  if(sv.closing){

        h('div',{style:{fontSize:'1.4em',marginBottom:'.1em'}},b.ico),
        h('div',{style:{fontSize:'.65em',fontWeight:'800',color:nv}},b.txt)
      ));
    });s.appendChild(badges);
    S.closingItems.filter(ci=>ci.title).slice(0,3).forEach(ci=>{
      s.appendChild(h('div',{style:{display:'flex',gap:'.4em',textAlign:'left',marginBottom:'.25em',padding:'.35em .5em',background:'#fafafa',borderRadius:'.4em',borderLeft:'.18em solid '+ac}},

      ));
    });
    s.appendChild(h('div',{style:{display:'inline-block',marginTop:'.6em',padding:'.5em 2em',background:'linear-gradient(135deg,'+nv+','+ac+')',color:'#fff',fontWeight:'900',fontSize:'.9em',borderRadius:'.7em'}},'가맹 상담 신청'));
  }
  if(sv.sign){
    s.appendChild(h('div',{style:{marginTop:'.8em',paddingTop:'.5em',borderTop:'1px solid #eee'}},
      h('div',{style:{fontSize:'1.3em',fontWeight:'900',color:nv,letterSpacing:'.15em'}},S.brand),
      h('div',{style:{fontSize:'.7em',color:'#555',marginTop:'.2em'}},S.signRole+' '+S.signName+(S.signPhone?' · '+S.signPhone:''))
    ));
  }
  slides.push(s);}

  // Render
  slides.forEach((s,i)=>{
    // 하단 바: 페이지번호(좌) + 브랜드명(중) + 로고(우)
    let foot=h('div',{style:{marginTop:'auto',display:'flex',alignItems:'center',justifyContent:'space-between',padding:'.3em .8em',borderTop:'1px solid #f0f0f0',background:'rgba(255,255,255,.7)'}});
    foot.appendChild(h('span',{style:{fontSize:'.5em',color:'#bbb',fontWeight:'600'}},(i+1)+' / '+slides.length));
    foot.appendChild(h('span',{style:{fontSize:'.45em',color:'#ccc',fontWeight:'700',letterSpacing:'.1em'}},S.brand+' · '+S.subtitle));
    if(S.brandLogo){let li=document.createElement('img');li.src=S.brandLogo;li.style.cssText='height:1em;max-width:3em;object-fit:contain;opacity:.45';foot.appendChild(li);}
    else{foot.appendChild(h('span',{style:{fontSize:'.5em',color:'#ddd'}},''));}
    s.appendChild(foot);
    el.appendChild(s);
  });
}
/* ═══════════════ PDF DOWNLOAD ═══════════════ */
function openLightbox(src){document.getElementById("lightboxImg").src=src;document.getElementById("lightbox").classList.add("show");}
function closeLightbox(){document.getElementById("lightbox").classList.remove("show");}
function downloadPDF(){
  // 미리보기 모드로 전환
  if(S.mode!=='preview'){S.mode='preview';render();}
  // ON/OFF 패널 숨기고 인쇄
  let panel=document.querySelector('#previewView .glass');
  if(panel)panel.style.display='none';
  // print style 삽입
  let ps=document.createElement('style');
  ps.id='printStyle';
  ps.textContent=`
    @media print{
      .mode-bar{display:none!important}
      #editView{display:none!important}
      #previewView{display:block!important;padding:0!important}
      .pv-onoff{display:none!important}
      .lightbox-overlay{display:none!important}
      .gallery-scroll{overflow:visible!important;flex-wrap:wrap!important}
      .gallery-scroll img{width:48%!important;height:auto!important;max-height:200px!important;scroll-snap-align:none!important;margin-bottom:8px}
      .wrap{max-width:100%!important;padding:0 20px!important}
      body{background:#fff!important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
      div[style*="linear-gradient"]{-webkit-print-color-adjust:exact;print-color-adjust:exact}
      a[href*="map.naver"]{display:none!important}
      @page{margin:12mm 10mm}
    }
  `;
  document.head.appendChild(ps);
  
  setTimeout(()=>{
    window.print();
    // 복원
    setTimeout(()=>{
      if(panel)panel.style.display='';
      let pse=document.getElementById('printStyle');
      if(pse)pse.remove();
    },500);
  },300);
}

/* ═══════════════ SAVE / LOAD ═══════════════ */
function saveJSON(){
  let d={...S};delete d.tab;delete d.mode;delete d.geminiKey;delete d.claudeKey;delete d.gDriveClientId;delete d.gDriveApiKey;
  let blob=new Blob([JSON.stringify(d,null,2)],{type:'application/json'});
  let a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=(S.brand||'제안서')+'_'+(S.storeName||'')+'_제안서.json';a.click();
}
function loadJSON(e){
  let f=e.target.files[0];if(!f)return;
  let r=new FileReader();r.onload=ev=>{try{let d=JSON.parse(ev.target.result);Object.assign(S,d);S.tab='basic';S.mode='edit';loadKeys();upd();}catch(err){alert('파일 형식 오류');}};r.readAsText(f);
}
// API Key는 localStorage에 별도 저장 (JSON 파일에 포함 안 됨)

// 자동 저장: 데이터 변경 시마다 localStorage에 백업
function autoSave(){try{let d={...S};delete d.tab;delete d.mode;delete d.geminiKey;delete d.claudeKey;localStorage.setItem('_ps_auto',JSON.stringify(d));}catch(e){}}
function autoLoad(){try{let raw=localStorage.getItem('_ps_auto');if(raw){let d=JSON.parse(raw);Object.assign(S,d);S.tab='basic';S.mode='edit';}}catch(e){}}
